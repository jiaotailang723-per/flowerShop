# JSP_visit
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

#static_resource
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,file:${user.dir}/static/

# database_setting
spring.datasource.url=jdbc:mysql://localhost:3306/flower_shop?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#C3P0
spring.datasource.type=com.mchange.v2.c3p0.ComboPooledDataSource
c3p0.minPoolSize=5
c3p0.maxPoolSize=20
c3p0.acquireIncrement=5
c3p0.maxIdleTime=3600

#log_setting
logging.level.root=INFO
logging.level.com.example.flower=TRACE
logging.level.org.springframework.security=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.example.flower.controller=DEBUG
logging.file.name=flower.log
logging.file.path=./logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

#cookie_setting
server.servlet.session.cookie.name=FLOWERSESSIONID
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false


# a file size limit 20MB
spring.servlet.multipart.max-file-size=20MB
# all require size limit 20MB
spring.servlet.multipart.max-request-size=20MB